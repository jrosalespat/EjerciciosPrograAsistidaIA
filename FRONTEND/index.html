<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Diaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Login/Register Modal -->
    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 id="authTitle" class="text-2xl font-bold text-gray-800">Iniciar Sesión</h2>
                <button onclick="cerrarModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-600 mb-1">Email</label>
                    <input type="email" id="loginEmail" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1">Contraseña</label>
                    <input type="password" id="loginPassword" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" 
                    class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
                    Iniciar Sesión
                </button>
                <p class="text-center text-gray-600">
                    ¿No tienes cuenta? 
                    <button type="button" onclick="mostrarRegistro()" class="text-blue-500 hover:underline">Regístrate</button>
                </p>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" class="space-y-4 hidden">
                <div>
                    <label class="block text-gray-600 mb-1">Nombre</label>
                    <input type="text" id="registerNombre" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1">Email</label>
                    <input type="email" id="registerEmail" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1">Contraseña</label>
                    <input type="password" id="registerPassword" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" 
                    class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
                    Registrarse
                </button>
                <p class="text-center text-gray-600">
                    ¿Ya tienes cuenta? 
                    <button type="button" onclick="mostrarLogin()" class="text-blue-500 hover:underline">Inicia Sesión</button>
                </p>
            </form>
        </div>
    </div>

    <!-- Main App (hidden until login) -->
    <div id="mainApp" class="hidden">
        <div class="container mx-auto px-4 py-8 max-w-2xl">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">📅 Agenda Diaria</h1>
                <div class="flex items-center gap-4">
                    <span id="userInfo" class="text-gray-600"></span>
                    <button onclick="logout()" class="text-red-500 hover:text-red-700 transition">
                        Cerrar Sesión
                    </button>
                </div>
            </div>
            
            <!-- Formulario para agregar evento -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">Nuevo Evento</h2>
                <form id="eventoForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-600 mb-1">Título</label>
                        <input type="text" id="titulo" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-1">Fecha</label>
                        <input type="date" id="fecha" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-1">Descripción</label>
                        <textarea id="descripcion" rows="3"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    <button type="submit" 
                        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
                        Agregar Evento
                    </button>
                </form>
            </div>
            
            <!-- Lista de eventos -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">Eventos</h2>
                <div id="eventosList" class="space-y-3">
                    <p class="text-gray-500 text-center">Cargando eventos...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
